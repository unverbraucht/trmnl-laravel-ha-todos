name: "HA Todos"
strategy: polling
polling_verb: post
polling_url: "{% assign base = ha_url | append: '/api/services/todo/get_items?return_response' | replace: '//api/', '/api/' %}{{ base }}"
polling_headers: "Authorization: Bearer {{ ha_token }}\nContent-Type: application/json"
polling_body: '{"entity_id": "{{ todo_entities }}", "status": "needs_action"}'
refresh_interval: 15

custom_fields:
  - keyname: ha_url
    field_type: text
    name: "Home Assistant URL"
    help: "e.g. http://192.168.1.100:8123 (no trailing slash)"
    required: true
  - keyname: ha_token
    field_type: text
    name: "Long-Lived Access Token"
    help: "Created in HA under Profile > Long-Lived Access Tokens"
    required: true
  - keyname: todo_entities
    field_type: text
    name: "Todo Entity IDs"
    help: "Comma-separated, e.g. todo.shopping_list,todo.tasks"
    required: true
  - keyname: todo_names
    field_type: text
    name: "Custom List Names (optional)"
    help: "Comma-separated names matching the entity IDs above, e.g. Shopping,Tasks"
    required: false
